name: pylint

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Pylint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
  
      - uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
  
      - name: Install dev dependencies
        run: |
          pip install pip-tools
          pip-sync requirements-dev.txt
  
      - name: Run pylint
        run: pylint wallet_service/ --recursive=y --fail-under=7.0 > pylint-report.txt

      - name: Extract pylint score
        id: score
        run: |
          SCORE=$(grep -oP 'rated at \K\d+\.\d+' pylint-report.txt || echo "0.0")
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "Pylint Score: **${SCORE}/10**" >> $GITHUB_STEP_SUMMARY

      - uses: actions/upload-artifact@v4
        if: always()  # Загружать даже при failure
        with:
          name: pylint-report
          path: pylint-report.txt
