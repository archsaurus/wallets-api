[tool.ruff]
line-length = 80
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "B", "UP"]
ignore = ["E501", "B008"]

[tool.mypy]
python_version = "3.14"
warn_return_any = true
strict = true

[tool.black]
line-length = 80
target-version = ["py314"]

[tool.isort]
profile = "black"

[tool.coverage.run]
source = ["wallet_service/application"]
omit = [
    "*/database.py", # Инфраструктура тестируется integration'ом
    "*/config.py", # Только unit
]
